services:
  postgres:
    image: postgres:16-alpine
    container_name: order-service-postgres
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: orderuser
      POSTGRES_PASSWORD: orderpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orderuser -d orderdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: order-service-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:7
    container_name: payment-processor-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10

  localstack:
    image: localstack/localstack:3
    container_name: localstack
    environment:
      SERVICES: sqs
      AWS_DEFAULT_REGION: us-east-1
      PERSISTENCE: 0
    ports:
      - "4566:4566"
    volumes:
      - ./order-service/localstack/init:/etc/localstack/init/ready.d
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues | grep -q pagamento-pix-status"]
      interval: 5s
      timeout: 5s
      retries: 30

  payment-processor:
    build: ./payment-processor
    container_name: payment-processor-app
    depends_on:
      mongo:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      PORT: 8081
      MONGO_URI: mongodb://mongo:27017/payments
      SQS_ENDPOINT: http://localstack:4566
      SQS_PIX_PENDENTE_QUEUE: pagamento-pix-pendente.fifo
      SQS_PIX_STATUS_QUEUE: pagamento-pix-status
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8081:8081"

  order-service:
    build: ./order-service
    container_name: order-service-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-processor:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: orderdb
      DB_USER: orderuser
      DB_PASS: orderpass
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: troque-em-producao-com-pelo-menos-256-bits-de-entropia-okk
      JWT_EXPIRATION: 3600
      PAYMENT_PROCESSOR_URL: http://payment-processor:8081
      SQS_ENDPOINT: http://localstack:4566
      SQS_PIX_STATUS_QUEUE: pagamento-pix-status
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"

  order-web:
    build:
      context: ./order-web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: order-web-app
    depends_on:
      order-service:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  mongo_data:
